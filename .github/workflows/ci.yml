name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix build .#nix-bulkfetch-url --print-build-logs

      - name: Run tests
        run: |
          set -euo pipefail

          TEST_URL="https://github.com/z1-0/nix-bulkfetch-url/archive/refs/heads/main.tar.gz"
          BIN=./result/bin/nix-bulkfetch-url

          echo "flat hash..."
          expected_flat=$(nix-prefetch-url "$TEST_URL")
          actual_flat=$(echo "$TEST_URL" | ${BIN} -j 1 --timeout 120 --format base32)

          echo "unpack hash..."
          expected_unpack=$(nix-prefetch-url --unpack "$TEST_URL")
          actual_unpack=$(echo "$TEST_URL" | ${BIN} --unpack -j 1 --timeout 120 --format base32)

          echo "flat:   expected=$expected_flat  actual=$actual_flat"
          echo "unpack: expected=$expected_unpack  actual=$actual_unpack"

          test "$expected_flat" = "$actual_flat" || { echo "FAIL: flat hash mismatch"; exit 1; }
          test "$expected_unpack" = "$actual_unpack" || { echo "FAIL: unpack hash mismatch"; exit 1; }

          echo "PASS"
